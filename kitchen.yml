---
driver:
  name: vagrant
  user_data: userdata.txt
  flavor_ref: m2.local.4c4m50d

verifier:
   name: inspec

provisioner:
  name: chef_infra
  product_name: cinc
  product_version: '18'
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10

suites:
  - name: default
    run_list:
      - recipe[ganeti-test]
  - name: instance_image
    verifier:
      inspec_tests:
        - test/integration/default
    run_list:
      - recipe[ganeti-test]
      - recipe[ganeti-test::instance_image]
      - recipe[ganeti-test::instance_image_variant]
      - recipe[ganeti-test::instance_image_instance]
      - recipe[ganeti-test::instance_image_subnet]
      - recipe[ganeti-test::instance_image_hook]
